    var askedQuestions = {};

function getRandomQuestion(letter) {
  var questionSet = questions[letter];

  var unansweredQuestions = questionSet.filter(function (question) {
    return !askedQuestions.hasOwnProperty(question);
  });

  // Check if all questions have been asked for the given letter
  if (unansweredQuestions.length === 0) {
    document.getElementById("question").innerHTML = "لا توجد اسئلة اضافية -لتكرار الأسئلة اعد تحميل الصفحة-";
    return;
  }

  var randomQuestion = unansweredQuestions[Math.floor(Math.random() * unansweredQuestions.length)];

  // Store the asked question
  askedQuestions[randomQuestion] = true;

  document.getElementById("question").innerHTML = randomQuestion;

  const buttons = document.querySelectorAll('.button');

  // Remove the 'button-clicked' class from all buttons
  buttons.forEach(function (btn) {
    btn.classList.remove('button-clicked');
  });

  // Add the 'button-clicked' class to the clicked button
  document.querySelector(`button[data-letter="${letter}"]`).classList.add('button-clicked');
}
